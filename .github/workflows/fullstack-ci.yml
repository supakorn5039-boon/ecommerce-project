name: FullStack CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend - Go CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_DSN: host=localhost user=postgres password=password dbname=ecommerce port=5432 sslmode=disable

    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.22

      - name: Run go mod tidy
        run: go mod tidy
        working-directory: backend

      - name: Build Go backend
        run: go build -o tmp/main ./cmd/api
        working-directory: backend

      - name: Run tests
        run: go test ./... -v
        working-directory: backend

  frontend:
    name: Frontend - React CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Clean node_modules
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

